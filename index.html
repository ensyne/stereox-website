<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StereoX - Rediscover Music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Space+Grotesk:wght@400;500;600&family=Newsreader:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --zinc-50: #fafafa;
            --zinc-100: #f4f4f5;
            --zinc-200: #e4e4e7;
            --zinc-300: #d4d4d8;
            --zinc-400: #a1a1aa;
            --zinc-500: #71717a;
            --zinc-600: #52525b;
            --zinc-800: #27272a;
            --zinc-900: #18181b;
            --zinc-950: #09090b;
            --rose-500: #e11d48;
            --rose-400: #fb7185;
            --canvas: #fafafa;
            --card: #ffffff;
            --border: rgba(0, 0, 0, 0.06);
            --shadow-tinted: rgba(9, 9, 11, 0.04);
        }

        body {
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: var(--zinc-800);
            background: var(--canvas);
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout ── */
        .site-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: calc(100dvh - 48px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 20px 40px -15px var(--shadow-tinted);
        }

        /* ── Left: Content ── */
        .hero-content {
            padding: 80px 72px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        .logo {
            height: 40px;
            width: auto;
            margin-bottom: 48px;
            opacity: 0;
            transform: translateY(16px);
            animation: reveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
        }

        .headline {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.05;
            color: var(--zinc-950);
            margin-bottom: 24px;
            max-width: 520px;
            opacity: 0;
            transform: translateY(16px);
            animation: reveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
        }

        .headline .accent {
            color: var(--rose-500);
        }

        .highlight {
            color: var(--rose-500);
            font-weight: 500;
        }

        .tagline {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--zinc-500);
            max-width: 440px;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(16px);
            animation: reveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
        }

        .sub {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 1.05rem;
            color: var(--zinc-400);
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(16px);
            animation: reveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
        }

        .cta {
            opacity: 0;
            transform: translateY(16px);
            animation: reveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
        }

        .cta a {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .cta a:hover {
            transform: translateY(-2px);
        }

        .cta a:active {
            transform: translateY(0);
        }

        .cta img {
            width: 160px;
            height: auto;
            display: block;
        }

        /* ── Right: Image ── */
        .hero-visual {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 48px;
            background: var(--zinc-50);
            border-left: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .hero-visual::before {
            content: '';
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(225, 29, 72, 0.04) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .hero-image {
            width: 100%;
            max-width: 440px;
            height: auto;
            object-fit: contain;
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(24px);
            animation: reveal 1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
        }

        /* ── Features strip ── */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 16px;
        }

        .feature-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-top: 3px solid var(--rose-500);
            border-radius: 0;
            padding: 32px 28px;
            box-shadow: 0 20px 40px -15px var(--shadow-tinted);
            opacity: 0;
            transform: translateY(16px);
        }


        .feature-card:nth-child(1) {
            animation: reveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
        }
        .feature-card:nth-child(2) {
            animation: reveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
        }
        .feature-card:nth-child(3) {
            animation: reveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.8s forwards;
        }

        .feature-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--rose-500);
            margin-bottom: 12px;
        }

        .feature-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--zinc-900);
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .feature-desc {
            font-size: 0.9rem;
            color: var(--zinc-500);
            line-height: 1.6;
        }

        /* ── Footer ── */
        .footer {
            padding: 40px 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transform: translateY(12px);
            animation: reveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
        }

        .footer-text {
            font-size: 0.8rem;
            color: var(--zinc-400);
            letter-spacing: 0.01em;
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            font-size: 0.8rem;
            color: var(--zinc-400);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--zinc-800);
        }

        /* ── Animation ── */
        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }


        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .hero-content {
                padding: 60px 48px;
            }

            .hero-visual {
                padding: 48px 32px;
            }
        }

        @media (max-width: 768px) {
            .site-wrapper {
                padding: 12px;
            }

            .hero {
                grid-template-columns: 1fr;
                min-height: auto;
                border-radius: 0;
            }

            .hero-visual {
                border-left: none;
                border-top: 1px solid var(--border);
                padding: 40px 24px;
            }

            .hero-content {
                padding: 40px 28px 48px;
            }

            .logo {
                height: 32px;
                margin-bottom: 32px;
            }

            .features {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-top: 12px;
            }

            .feature-card {
                border-radius: 0;
                padding: 24px 22px;
            }

            .footer {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .hero-content {
                padding: 32px 22px 40px;
            }

            .hero-visual {
                padding: 32px 20px;
            }

            .headline {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="site-wrapper">
    <div class="hero">
        <div class="hero-content">
            <img src="stereox.svg" alt="StereoX" class="logo">
            <p class="tagline">Tactile, visually rich, and deeply personal. StereoX restores <span class="highlight">history, context, and meaning</span> to every album in your library through a vinyl-inspired interface.</p>
            <p class="sub">Browse your collection. Play what matters. See them live.</p>
            <div class="cta">
                <a href="https://apps.apple.com/us/app/stereo-music-player/id1418449715?mt=8" target="_blank">
                    <img src="download.svg" alt="Download on the App Store">
                </a>
            </div>
        </div>
        <div class="hero-visual">
            <img src="hero.png" alt="StereoX App" class="hero-image">
        </div>
    </div>

        <span class="footer-text">&copy; 2026 StereoX</span>
        <div class="footer-links">

        </div>
    </footer>
</div>
</body>
</html>
